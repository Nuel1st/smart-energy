{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Smart Energy Monitor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">⚡Smart Energy Monitoring System</a>
            {% if user.is_authenticated %}
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'devices' %}">Devices</a>
                    <!-- <a class="nav-link" href="{% url 'logout' %}">Logout ({{ user.username }})</a> -->
                     <form method="POST" action="{% url 'logout' %}" >
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link p-0 border-0">
                            Logout ({{ user.username }})
                        </button>
                    </form>
                </div>
            {% endif %}
        </div>
    </nav>
    
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
